name: desktop-build

on:
  push:
  pull_request:

jobs:
  electron-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install desktop dependencies
        run: npm --prefix desktop install
      - name: Build desktop assets
        run: node desktop/build.js
      - name: Build bundled app
        env:
          CI: "true"
        run: npm --prefix desktop run electron:bundle
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: electron-bundle
          path: desktop/dist
